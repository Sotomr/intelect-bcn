name: Intelect BCN

# Cada dilluns ~09:00 UTC ≈ 10:00 CET / 11:00 CEST (digest setmanal + novetats).
# Pots canviar a diari (p. ex. 0 9 * * *) si vols avisos més sovint.
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intelect-bcn
  cancel-in-progress: false

env:
  # Actions basades en JS: compatibilitat amb el canvi a Node 24 (2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # El runner és UTC; fixem zona igual que en local (finestra de dates coherent)
          TIMEZONE: Europe/Madrid
          # CCCB sovint 504: reintents ràpids sense bloquejar 5–10 min
          HTTP_READ_TIMEOUT: "75"
          HTTP_MAX_ATTEMPTS: "4"
          GUIA_CSV_TIMEOUT: "120"
          RSS_HTTP_READ_TIMEOUT: "55"
        run: python src/main.py

      - name: Commit snapshot i registre de novetats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_snapshot.json data/seen_event_keys.json
          if git diff --cached --quiet; then
            echo "No canvis a data/"
          else
            git commit -m "chore: update intelect snapshot i registre de novetats"
            git push
          fi
