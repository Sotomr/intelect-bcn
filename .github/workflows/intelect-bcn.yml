name: Intelect BCN

# Cada dilluns ~09:00 UTC ≈ 10:00 CET / 11:00 CEST (digest setmanal + novetats).
# Pots canviar a diari (p. ex. 0 9 * * *) si vols avisos més sovint.
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intelect-bcn
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit snapshot i registre de novetats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_snapshot.json data/seen_event_keys.json
          if git diff --cached --quiet; then
            echo "No canvis a data/"
          else
            git commit -m "chore: update intelect snapshot i registre de novetats"
            git push
          fi
